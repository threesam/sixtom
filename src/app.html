<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#161616" />
		<meta name="author" content="Sam D'Angelo" />
		<meta name="format-detection" content="telephone=no" />

		<title>SIXTOM — i build your solution.</title>
		<meta
			name="description"
			content="AI built your first draft. i build your solution. production-grade in two weeks. $10,000 flat, 1 client a month."
		/>
		<!-- Canonical URL is set dynamically per-route in src/routes/+layout.svelte
		     using $app/state's page.url.pathname; do not hardcode here to avoid
		     duplicate canonical tags on non-home routes. -->

		<!-- Search engine ownership verification. Tokens come from each console;
		     leave the TODO values until you paste in real ones, then verify. -->
		<meta name="google-site-verification" content="TODO_paste_from_search_console" />
		<meta name="msvalidate.01" content="TODO_paste_from_bing_webmaster" />

		<link rel="preconnect" href="https://analytics.sixtom.com" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/recursive.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/space-grotesk.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>

		<meta property="og:title" content="SIXTOM — i build your solution." />
		<meta
			property="og:description"
			content="production-grade in two weeks. $10,000 flat, 1 client a month."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sixtom.com/" />
		<meta property="og:image" content="https://sixtom.com/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta
			property="og:image:alt"
			content="SIXTOM — AI built your first draft. I build your solution."
		/>

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="SIXTOM — i build your solution." />
		<meta
			name="twitter:description"
			content="production-grade in two weeks. $10,000 flat, 1 client a month."
		/>
		<meta name="twitter:image" content="https://sixtom.com/og.png" />
		<meta
			name="twitter:image:alt"
			content="SIXTOM — AI built your first draft. I build your solution."
		/>

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

		<script
			defer
			src="https://analytics.sixtom.com/script.js"
			data-website-id="64398c1a-02a0-4a61-991c-b0d143f01b46"
		></script>
		<!-- Hero bubble-field animation. Standalone (no framework) so the home page
		     stays csr=false; no-ops on pages without a [data-bubble] canvas. -->
		<script defer src="%sveltekit.assets%/bubbles.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
