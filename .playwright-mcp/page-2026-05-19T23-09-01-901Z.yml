              - img [ref=e17]
          - paragraph [ref=e19]: domain experts can build with AI but can they ship? 🚢💨 not without the last mile. i'm onboarding folks who in their first week fire 30k lines out of a cannon before fully understanding what a PR is. what they can't do is the part that turns "it works on my machine" into "it lives in a codebase without busting the next person's vibes." merge conflicts. design system drift. security review. the test suite. the guardrails we set up for Claude's next battle. am i a code-review bot? a Claude whisperer? more like a reformed control freak helping a startup's internals survive five non-engineers shipping multiple times a day. whatever we call that now, it's the job.
      - listitem [ref=e20]:
        - article [ref=e21]:
          - generic [ref=e22]:
            - time [ref=e23]: May 17, 2026
            - link "View on LinkedIn" [ref=e24] [cursor=pointer]:
              - /url: https://www.linkedin.com/feed/update/urn:li:share:7461778354963120128
              - img [ref=e25]
          - paragraph [ref=e27]: i've been coding for about how long i've been a dad, 8 years. i've been using AI seriously for 8 months. some days i feel like i'm running circles around me a year ago. some days things get launched that i wouldn't have even swung on. other days i feel like i'm playing pretend, like the fire i've been given will burn out just as quick as it started. maybe. but whatever's happening is too new for anyone to actually feel like they belong, so just keep shipping until the doubt fades to noise. ✌️
      - listitem [ref=e28]:
        - article [ref=e29]:
          - generic [ref=e30]:
            - time [ref=e31]: May 14, 2026
            - link "View on LinkedIn" [ref=e32] [cursor=pointer]:
              - /url: https://www.linkedin.com/feed/update/urn:li:share:7460692370108628993
              - img [ref=e33]
          - paragraph [ref=e35]: rules people have to hold in their head rarely transfer to their hands. i want to go fast. i want my team to go fast. and i want to scale — not spend my productivity gains policing standards after the fact. so i flipped every type to strict. every lint rule to error. every function necessary and tested. in practice, three Claude agents (and me) cleared 320 violations in 10 minutes, validated in 20. the kind of "nice to have" that i never would have gotten around to. a dark factory should have neon guardrails.
